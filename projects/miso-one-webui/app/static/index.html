<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miso One WebUI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Miso One WebUI</h1>
          <p>Local MisoTTS 8B text-to-speech, prompt-audio cloning, and dialogue generation.</p>
        </div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Checking...</span>
          <button id="loadModel" type="button">Load model</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Generation modes">
        <button class="tab active" data-tab="single" type="button">Sample</button>
        <button class="tab" data-tab="clone" type="button">Clone</button>
        <button class="tab" data-tab="dialogue" type="button">Dialogue</button>
        <button class="tab" data-tab="history" type="button">History</button>
      </nav>

      <section id="single" class="panel active">
        <form id="singleForm" class="form">
          <label>
            Text
            <textarea name="text" rows="5" required>Hello from Miso.</textarea>
          </label>
          <div class="grid">
            <label>Speaker <input name="speaker" type="number" min="0" max="99" value="0" /></label>
            <label>Max ms <input name="max_audio_length_ms" type="number" min="1000" max="90000" value="10000" /></label>
            <label>Temperature <input name="temperature" type="number" step="0.05" min="0.05" max="2" value="0.9" /></label>
            <label>Top-k <input name="topk" type="number" min="1" max="2048" value="50" /></label>
          </div>
          <button type="submit">Generate sample</button>
        </form>
      </section>

      <section id="clone" class="panel">
        <form id="cloneForm" class="form">
          <label>
            Reference audio
            <input name="reference_audio" type="file" accept="audio/*" required />
          </label>
          <label>
            Reference transcript
            <textarea name="reference_text" rows="3" required></textarea>
          </label>
          <label>
            New text
            <textarea name="text" rows="5" required>This is the next sentence to synthesize.</textarea>
          </label>
          <div class="grid">
            <label>Speaker <input name="speaker" type="number" min="0" max="99" value="0" /></label>
            <label>Max ms <input name="max_audio_length_ms" type="number" min="1000" max="90000" value="10000" /></label>
            <label>Temperature <input name="temperature" type="number" step="0.05" min="0.05" max="2" value="0.9" /></label>
            <label>Top-k <input name="topk" type="number" min="1" max="2048" value="50" /></label>
          </div>
          <label class="check">
            <input name="voice_consent" type="checkbox" value="true" required />
            I have rights to use this reference voice.
          </label>
          <button type="submit">Generate clone</button>
        </form>
      </section>

      <section id="dialogue" class="panel">
        <form id="dialogueForm" class="form">
          <div id="turns" class="turns"></div>
          <div class="row">
            <button id="addTurn" type="button">Add turn</button>
            <button type="submit">Generate dialogue</button>
          </div>
          <div class="grid">
            <label>Max ms per turn <input name="max_audio_length_ms" type="number" min="1000" max="90000" value="10000" /></label>
            <label>Temperature <input name="temperature" type="number" step="0.05" min="0.05" max="2" value="0.9" /></label>
            <label>Top-k <input name="topk" type="number" min="1" max="2048" value="50" /></label>
          </div>
        </form>
      </section>

      <section id="history" class="panel">
        <div class="row">
          <button id="refreshHistory" type="button">Refresh</button>
        </div>
        <div id="historyList" class="results"></div>
      </section>

      <section class="panel active result-panel" aria-live="polite">
        <h2>Latest output</h2>
        <div id="message" class="message">No output yet.</div>
        <div id="latest" class="results"></div>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result">
        <div class="result-head">
          <strong class="mode"></strong>
          <span class="meta"></span>
        </div>
        <p class="text"></p>
        <audio controls></audio>
        <a class="download" download>Download WAV</a>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
